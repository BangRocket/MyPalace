name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # The standalone palace_client subpackage is imported at module
          # top in tests/integration/test_client_e2e.py, so collection
          # fails without it (even though the integration tests themselves
          # are deselected by the default -m 'not integration' filter).
          pip install -e ./palace_client
      - name: Lint
        run: ruff check palace/ tests/ palace_client/
      - name: Test
        run: pytest tests/
      - name: Test palace_client
        run: pytest palace_client/tests/

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read   # required by actions/checkout — declaring `permissions:`
                       # otherwise strips this default and checkout fails with
                       # "Repository not found".
      id-token: write  # for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install build twine
      - name: Build palace-memory
        run: python -m build --outdir dist-server .
      - name: Build palace-client
        working-directory: palace_client
        run: python -m build --outdir ../dist-client .
      - name: Inspect artifacts
        run: |
          ls -lh dist-server dist-client
          twine check dist-server/* dist-client/*
      - name: Publish palace-memory to TestPyPI
        if: contains(github.ref, 'rc') || contains(github.ref, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-server/
      - name: Publish palace-client to TestPyPI
        if: contains(github.ref, 'rc') || contains(github.ref, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-client/
      - name: Publish palace-memory to PyPI
        if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'beta') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-server/
      - name: Publish palace-client to PyPI
        if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'beta') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-client/

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Skip cleanly if DOCKERHUB_USERNAME isn't configured. `secrets.X` can't
    # be referenced directly in `if:` so we bridge through env first.
    env:
      DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
    if: ${{ vars.PUBLISH_DOCKER == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker Hub secrets present
        if: env.DH_USER == ''
        run: |
          echo "::error::vars.PUBLISH_DOCKER=true but secrets.DOCKERHUB_USERNAME is empty."
          echo "Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repo Secrets, or unset"
          echo "vars.PUBLISH_DOCKER to skip the docker job."
          exit 1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bangrocket/palace:${{ steps.version.outputs.version }}
            bangrocket/palace:latest

  github-release:
    needs: [build-and-publish]
    # docker is intentionally NOT a hard dep — operators without Docker Hub
    # configured shouldn't be blocked from cutting a GitHub release.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
